# CI pipeline for python-cfdiclient
# Triggers on every push (all branches) and on pull requests targeting master.
# Jobs that have no dependency on each other run in parallel.
#
# Action SHAs are pinned for supply-chain security.
# Rotate these periodically or let Dependabot keep them current.

name: CI

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
      - ".editorconfig"
  pull_request:
    branches:
      - master
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".gitignore"
      - ".editorconfig"
  # Allow publish.yml to invoke the full CI suite before publishing.
  workflow_call:

# Cancel in-progress runs for the same ref so stale runs do not consume runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: individual jobs grant only what they need.
permissions:
  contents: read

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (pylint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pipenv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-py3.12-pipenv-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-py3.12-pipenv-

      - name: Install pipenv and dev dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --deploy

      - name: Run pylint
        run: |
          pipenv run pylint cfdiclient/ --rcfile=pylint.rc --fail-under=8.0

  # ── Type check ────────────────────────────────────────────────────────────
  type-check:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pipenv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-py3.12-pipenv-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-py3.12-pipenv-

      - name: Install pipenv and dev dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --deploy

      - name: Run mypy
        run: |
          pipenv run mypy cfdiclient/ --ignore-missing-imports --strict

  # ── Security scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security scan (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pipenv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-py3.12-pipenv-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-py3.12-pipenv-

      - name: Install pipenv and dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --deploy

      - name: Run pip-audit
        run: |
          pipenv run pip-audit --require-hashes --strict

  # ── Tests (matrix) ────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pipenv virtualenv
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.local/share/virtualenvs
          key: ${{ runner.os }}-py${{ matrix.python-version }}-pipenv-${{ hashFiles('Pipfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ matrix.python-version }}-pipenv-

      - name: Install pipenv and dependencies
        run: |
          python -m pip install --upgrade pip pipenv
          pipenv install --dev --deploy

      - name: Run tests with coverage
        run: |
          pipenv run pytest tests/ \
            --cov=cfdiclient \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Upload coverage to Codecov
        # Only upload once (from the most recent Python version) to avoid duplicate reports.
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@ad3126e916f78f00edff4cda1d3b55f23a0df9b8 # v5.4.2
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
